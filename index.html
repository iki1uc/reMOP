<!DOCTYPE html>
<html>
<head>
    <title>reMOP – Operation Manager</title>
</head>
<body>
    <h1>reMOP – Operation Manager</h1>
    <p>Verwaltet Operationen und Systemabläufe.</p>

    <button onclick="runOp('start')">Start</button>
    <button onclick="runOp('stop')">Stop</button>
    <button onclick="runOp('reset')">Reset</button>

    <script>
        function runOp(op) {
            console.log("Operation:", op);
        }
    </script>
</body>
</html>
